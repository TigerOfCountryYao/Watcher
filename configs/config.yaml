model:
  emb_dim: 128
  feat_dim: 128
  text_model_name: "sentence-transformers/all-MiniLM-L6-v2"
  text_model_cache_dir: "models/hf"
  freeze_text_encoder: true

data:
  image_size: 224
  annotation_file: ""
  random_size: 512

train:
  device: "cpu"
  epochs: 5
  batch_size: 8
  num_workers: 0
  lr: 0.0003
  out_dir: "checkpoints"
  log_file: "logs/train.log"

infer:
  device: "cpu"
  checkpoint: ""
  capture_mode: "desktop"
  monitor: 1
  window_title: ""
  instruction: "watch for popup"
  threshold: 0.5
  sleep_seconds: 0.03
